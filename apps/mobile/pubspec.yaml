name: gifteeng
description: Gifteeng — Gift smarter. Earn Goins. Play & Win.
publish_to: 'none'
version: 1.0.0+4014

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.1

  # HTTP & serialization
  dio: ^5.7.0
  json_annotation: ^4.9.0

  # Secure storage & prefs
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.5

  # Animations
  flutter_animate: ^4.5.2
  lottie: ^3.1.0

  # UI components
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.16
  gap: ^3.0.1
  smooth_page_indicator: ^1.2.0+3
  pinput: ^5.0.1

  # Payments
  razorpay_flutter: ^1.3.7

  # Biometric auth
  local_auth: ^2.3.0

  # SMS OTP autofill
  sms_autofill: ^2.4.0

  # Game effects
  confetti: ^0.7.0
  audioplayers: ^6.1.0

  # Image picker (customizer uploads)
  image_picker: ^1.1.2

  # Interactive scratch card (Gift Casino)
  scratcher: ^2.5.0

  # Fortune / spin wheel (Gift Casino)
  flutter_fortune_wheel: ^1.3.1

  # Animated digit counter (coin balance)
  animated_digit: ^3.2.4

  # Swipe-to-delete for cart/wishlist items
  flutter_slidable: ^3.1.1

  # Canvas editor widgets (full customizer)
  flutter_colorpicker: ^1.1.0
  # ── Removed (unused): ─────────────────────────────────────────────────
  #   matrix_gesture_detector  → not referenced anywhere; dropped
  #   flutter_staggered_animations → not referenced; dropped
  #   skeletonizer            → unused (we use shimmer instead); dropped
  #   flutter_tilt            → unused; dropped (saved ~80 KB APK)

  # Save canvas as image + save to gallery
  screenshot: ^3.0.0
  path_provider: ^2.1.4
  gallery_saver_plus: ^3.2.3

  # i18n (Hindi, Marathi, English)
  flutter_localizations:
    sdk: flutter

  # Utils
  intl: ^0.20.2
  url_launcher: ^6.3.1
  geolocator: ^13.0.2        # GPS coords for address auto-fill
  share_plus: ^10.1.4
  package_info_plus: ^8.3.0
  connectivity_plus: ^6.1.3

  # (Premium showcase polish — flutter_tilt removed, was unused.)

  # Error + performance monitoring
  sentry_flutter: ^8.10.0

  # Push notifications (FCM). Requires google-services.json (Android) and
  # GoogleService-Info.plist (iOS) from your Firebase console. The
  # PushService class no-ops gracefully if these aren't set up yet.
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.4
  json_serializable: ^6.9.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  generate: true          # enables synthetic package:flutter_gen/gen_l10n/app_localizations.dart
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/sfx/
    - assets/icon/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#EF3752"
  adaptive_icon_foreground: "assets/icon/icon_fg.png"
  web:
    generate: false
