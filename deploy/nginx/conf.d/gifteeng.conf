# -----------------------------------------------------------------------------
# Gifteeng nginx configuration  —  new.* subdomains
#   new.gifteeng.com          -> B2C Next.js  (127.0.0.1:3000)
#   new-business.gifteeng.com -> B2B Next.js  (127.0.0.1:3000)
#   new-api.gifteeng.com      -> NestJS API   (127.0.0.1:4000)
#
# Certificates: certbot --nginx (Let's Encrypt)
#   certbot --nginx \
#     -d new.gifteeng.com \
#     -d new-business.gifteeng.com \
#     -d new-api.gifteeng.com \
#     --non-interactive --agree-tos -m admin@gifteeng.com
# -----------------------------------------------------------------------------

# ---------- HTTP → HTTPS redirect ----------
server {
    listen 80;
    listen [::]:80;
    server_name new.gifteeng.com new-business.gifteeng.com new-api.gifteeng.com;
    return 301 https://$host$request_uri;
}

# ---------- B2C: new.gifteeng.com ----------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name new.gifteeng.com;

    ssl_certificate     /etc/letsencrypt/live/new.gifteeng.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/new.gifteeng.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 100m;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 300s;
    }
}

# ---------- B2B: new-business.gifteeng.com ----------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name new-business.gifteeng.com;

    ssl_certificate     /etc/letsencrypt/live/new.gifteeng.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/new.gifteeng.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 100m;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Tenant          b2b;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 300s;
    }
}

# ---------- API: new-api.gifteeng.com ----------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name new-api.gifteeng.com;

    ssl_certificate     /etc/letsencrypt/live/new.gifteeng.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/new.gifteeng.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 100m;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;

    location / {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
